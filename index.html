<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#7c3aed" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="RinoHabits" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <title>RinoHabits</title>
    <script>
      (function () {
        var stored = localStorage.getItem('rinohabits_theme')
        var isDark = stored === 'dark' || (stored !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches)
        document.documentElement.classList.toggle('dark', isDark)
      })()
    </script>
    <script>
      (function () {
        // Confirmado por teste real: em modo standalone (PWA instalado), o WebKit do
        // iOS calcula "position:fixed; inset:0" / 100dvh com altura MENOR que a tela
        // real, sobrando uma faixa visível embaixo. Medir via window.innerHeight (que
        // reflete o tamanho real renderizado) e gravar num valor fixo em pixel é a
        // única forma confiável de contornar esse bug específico do WebKit.
        function setAppHeight() {
          var h = (window.visualViewport && window.visualViewport.height) || window.innerHeight
          document.documentElement.style.setProperty('--app-height', h + 'px')
        }
        setAppHeight()
        window.addEventListener('resize', setAppHeight)
        window.addEventListener('orientationchange', setAppHeight)
        if (window.visualViewport) {
          window.visualViewport.addEventListener('resize', setAppHeight)
        }
      })()
    </script>
    <script>
      (function () {
        // Safari ignora "user-scalable=no" na meta viewport (decisão deliberada da
        // Apple por acessibilidade desde iOS 10). Esses listeners bloqueiam o gesto
        // de pinça diretamente, que é a única forma que funciona lá. O duplo-toque
        // já é coberto pelo "touch-action: manipulation" no CSS, sem risco de
        // engolir toques rápidos legítimos em botões diferentes.
        document.addEventListener('gesturestart', function (e) { e.preventDefault() }, { passive: false })
        document.addEventListener('gesturechange', function (e) { e.preventDefault() }, { passive: false })
        document.addEventListener('gestureend', function (e) { e.preventDefault() }, { passive: false })

        document.addEventListener(
          'touchmove',
          function (e) {
            if (e.touches.length > 1) e.preventDefault()
          },
          { passive: false },
        )
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
