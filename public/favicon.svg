<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <!-- Fundo: grafite premium com leve tom roxo/azul-escuro -->
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#221b3f"/>
      <stop offset="0.55" stop-color="#161226"/>
      <stop offset="1" stop-color="#0a0913"/>
    </linearGradient>

    <!-- Chama externa: verde neon vibrante (conclusão / dopamina / progresso) -->
    <linearGradient id="flameOuter" x1="256" y1="378" x2="256" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00E08A"/>
      <stop offset="1" stop-color="#3CFFB0"/>
    </linearGradient>

    <!-- Núcleo interno da chama: tom mais claro, dá profundidade -->
    <linearGradient id="flameInner" x1="256" y1="346" x2="256" y2="216" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#CFFFE9"/>
      <stop offset="1" stop-color="#7CFFCB"/>
    </linearGradient>

    <!-- Brilho sutil no canto superior esquerdo (toque glassmorphism) -->
    <radialGradient id="sheen" cx="28%" cy="20%" r="65%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <!-- Brilho neon (glow) atrás do símbolo central -->
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Squircle de fundo -->
  <rect width="512" height="512" rx="124" fill="url(#bg)"/>
  <rect width="512" height="512" rx="124" fill="url(#sheen)"/>

  <!-- Anel interno sutil (acabamento premium) -->
  <rect x="8" y="8" width="496" height="496" rx="118" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>

  <!-- Chama: símbolo único, verde neon com núcleo claro, glow -->
  <g filter="url(#glow)">
    <path
      d="M256 122
         C214 176 174 220 174 286
         C174 340 209 380 256 380
         C303 380 338 340 338 286
         C338 236 308 210 290 174
         C287 208 268 222 266 194
         C264 168 256 146 256 122 Z"
      fill="url(#flameOuter)"
    />
    <path
      d="M256 224
         C234 254 216 276 216 306
         C216 332 233 350 256 350
         C279 350 296 332 296 306
         C296 282 280 266 270 246
         C267 264 254 270 253 252
         C252 238 256 232 256 224 Z"
      fill="url(#flameInner)"
    />
  </g>
</svg>
